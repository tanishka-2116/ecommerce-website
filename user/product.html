<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2 class="logo">🛍️ ShopEasy</h2>

    <div class="nav-links">
        <a href="dashboard.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
        <a href="login.html">Logout</a>
    </div>
</nav>

<hr>

<!-- PRODUCT SECTION -->
<div class="product-page">

    <div class="product-image">
        <img id="product-img">
    </div>

    <div class="product-details">
        <h2 id="product-name"></h2>

        <p class="price" id="product-price"></p>

        <p id="product-desc"></p>

        <br>

        <button onclick="location.href='cart.html'">Add to Cart</button>
        <button onclick="location.href='order.html'">Buy Now</button>
    </div>

</div>

<!-- SCRIPT -->
<script>
const params = new URLSearchParams(window.location.search);
const product = params.get("product");

const data = {
    shoes: {
        name: "Shoes",
        price: "₹1000",
<img src="../images/shoe.jpg">
        desc: "Comfortable and stylish shoes perfect for daily wear."
    },
    watch: {
        name: "Watch",
        price: "₹2000",
<img src="../images/watch.jpg">
        desc: "Elegant wrist watch with modern design."
    },
    bag: {
        name: "Bag",
        price: "₹1500",
<img src="../images/bag.jpg">
        desc: "Durable and stylish travel bag."
    },
    phone: {
        name: "Phone",
        price: "₹15000",
<img src="../images/phone.jpg">
        desc: "Smartphone with powerful features."
    },
    headphones: {
        name: "Headphones",
        price: "₹2000",
<img src="../images/headphones.jpg">
        desc: "High quality sound headphones."
    },
    laptop: {
        name: "Laptop",
        price: "₹50000",
<img src="../images/laptop.jpg">
        desc: "High performance laptop for work and gaming."
    }
};

const selected = data[product];

if (selected) {
    document.getElementById("product-name").innerText = selected.name;
    document.getElementById("product-price").innerText = selected.price;
    document.getElementById("product-img").src = selected.img;
    document.getElementById("product-desc").innerText = selected.desc;
}
</script>

</body>
</html>
